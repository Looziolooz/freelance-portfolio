<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<div class="carousel-3d">
  <div class="carousel-stage">
    <ul class="carousel-track">
      <li class="slide is-active">
        <div class="slide-card">
          <img class="slide-img" src="https://images.unsplash.com/photo-1467232004584-a241de8bcf5d?w=1000&h=1000&q=85&fit=crop&fm=webp" alt="Scrivania luminosa con lavoro di design in corso" draggable="false">
          <div class="slide-shade" aria-hidden="true"></div>
          <div class="slide-overlay">
            <h3 class="slide-title">Siti su misura</h3>
            <button class="slide-pill" type="button">Esplora</button>
          </div>
        </div>
      </li>
      <li class="slide">
        <div class="slide-card">
          <img class="slide-img" src="https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?w=1000&h=1000&q=85&fit=crop&fm=webp" alt="Carrello e acquisti, vetrina di un e-commerce" draggable="false">
          <div class="slide-shade" aria-hidden="true"></div>
          <div class="slide-overlay">
            <h3 class="slide-title">E-commerce che converte</h3>
            <button class="slide-pill" type="button">Esplora</button>
          </div>
        </div>
      </li>
      <li class="slide">
        <div class="slide-card">
          <img class="slide-img" src="https://images.unsplash.com/photo-1497366216548-37526070297c?w=1000&h=1000&q=85&fit=crop&fm=webp" alt="Spazio creativo curato per un brand riconoscibile" draggable="false">
          <div class="slide-shade" aria-hidden="true"></div>
          <div class="slide-overlay">
            <h3 class="slide-title">Brand che si notano</h3>
            <button class="slide-pill" type="button">Esplora</button>
          </div>
        </div>
      </li>
      <li class="slide">
        <div class="slide-card">
          <img class="slide-img" src="https://images.unsplash.com/photo-1518770660439-4636190af475?w=1000&h=1000&q=85&fit=crop&fm=webp" alt="Circuiti e tecnologia per automazioni intelligenti" draggable="false">
          <div class="slide-shade" aria-hidden="true"></div>
          <div class="slide-overlay">
            <h3 class="slide-title">Automazioni intelligenti</h3>
            <button class="slide-pill" type="button">Esplora</button>
          </div>
        </div>
      </li>
    </ul>
  </div>

  <div class="carousel-controls">
    <button class="ctrl ctrl-prev" type="button" aria-label="Slide precedente">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M15 18l-6-6 6-6"></path>
      </svg>
    </button>
    <button class="ctrl ctrl-next" type="button" aria-label="Slide successiva">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M9 6l6 6-6 6"></path>
      </svg>
    </button>
  </div>
</div>
