<div class="mbs-root">
  <section class="mbs-scene" data-scene>

    <div class="mbs-stage">
      <h2 class="mbs-title" data-title>
        Il tuo sito, costruito per vendere.<br><span class="mbs-title-em">Sul serio.</span>
      </h2>

      <div class="mbs-perspective">
        <!-- Lid: closed and tilted at start, opens to flat on scroll -->
        <div class="mbs-lid" data-lid>
          <div class="mbs-screen">
            <div class="mbs-bezel">
              <span class="mbs-camera" aria-hidden="true"></span>
              <img class="mbs-screen-img" data-screen
                   src="https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=1280&q=85&fm=webp"
                   alt="Anteprima di una dashboard web pulita su schermo di laptop" loading="eager">
            </div>
          </div>
          <!-- Closed-lid face: neutral monogram, no third-party logo -->
          <div class="mbs-lid-back" aria-hidden="true">
            <span class="mbs-mono">ls</span>
          </div>
        </div>

        <!-- Base: keyboard deck, trackpad, speakers, power button -->
        <div class="mbs-base">
          <div class="mbs-deck">
            <div class="mbs-speaker mbs-speaker-l" aria-hidden="true"></div>
            <div class="mbs-speaker mbs-speaker-r" aria-hidden="true"></div>

            <div class="mbs-keyboard" data-keyboard aria-hidden="true">
              <!-- key rows filled by index.js -->
            </div>

            <div class="mbs-trackpad" aria-hidden="true"></div>
            <span class="mbs-power" aria-hidden="true"></span>
          </div>
          <div class="mbs-lip" aria-hidden="true"></div>
        </div>
      </div>
    </div>

    <p class="mbs-hint" data-hint aria-hidden="true">scorri</p>
  </section>
</div>
